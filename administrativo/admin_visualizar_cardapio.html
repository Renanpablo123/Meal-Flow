<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <title>MealFlow - Visualizar Cardápio</title>
</head>
<body>
    <header class="main-header">
        <div class="logo-container">
            <img src="../assets/logo Meal-Flow.png" alt="Meal-Flow Logo" class="logo">
            <span class="brand-name">
                <span class="meal">Meal</span><span class="flow">Flow</span>
            </span>
        </div>
        <div class="header-title-container">
            <h1>Cardápio Atual</h1>
            <p>Visualize e gerencie os itens do seu cardápio.</p>
        </div>
    </header>
    <main>
        <h2>Cardápio Atual</h2>

        <h3>Entradas</h3>
        <table border="1">
            <thead>
                <tr>
                    <th>Nome do Item</th>
                    <th>Ingredientes</th>
                    <th>Preço (R$)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Batata Frita</td>
                    <td>Batata, sal, óleo</td>
                    <td>25,00</td>
                </tr>
            </tbody>
        </table>

        <br>

        <h3>Bebidas</h3>
        <table border="1">
            <thead>
                <tr>
                    <th>Nome do Item</th>
                    <th>Ingredientes</th>
                    <th>Preço (R$)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Suco de Laranja</td>
                    <td>Laranja e açúcar</td>
                    <td>10,00</td>
                </tr>
            </tbody>
        </table>

        <br>
        
        <a href="admin_editar_cardapio.html"><button type="button">Cadastrar Novo Item</button></a>
        <a href="admin_painel.html"><button type="button">Retornar ao Painel Anterior</button></a>
    </main>
    <script src="../script.js"></script>
</body>
</html>
