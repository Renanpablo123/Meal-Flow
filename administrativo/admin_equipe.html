<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <title>MealFlow - Gerenciar Equipe</title>
</head>
<body>
    <header class="main-header">
        <div class="logo-container">
            <img src="../assets/logo Meal-Flow.png" alt="Meal-Flow Logo" class="logo">
            <span class="brand-name">
                <span class="meal">Meal</span><span class="flow">Flow</span>
            </span>
        </div>
        <div class="header-title-container">
            <h1>Gerenciar Equipe</h1>
            <p>Adicione novos funcionários e gerencie suas funções.</p>
        </div>
    </header>
    <main>
        <h2>Cadastrar Novo Funcionário</h2>
        <form action="admin_painel.html" method="GET">
            
            <div>
                <label for="nome_funcionario">Nome do Funcionário:</label>
                <input type="text" id="nome_funcionario" name="nome_funcionario" required>
            </div>
            <br>

            <div>
                <label for="email_funcionario">E-mail da Conta (obrigatório):</label>
                <input type="email" id="email_funcionario" name="email_funcionario" placeholder="exemplo@email.com" required>
            </div>
            <br>

            <div>
                <p>Função (Selecione um bloco):</p>
                <select id="funcao" name="funcao" required>
                    <option value="" disabled selected>Escolha a função...</option>
                    <option value="garcom">Garçom</option>
                    <option value="cozinha">Cozinha</option>
                    <option value="admin">Administração</option>
                </select>
            </div>
            <br>

            <button type="submit">Cadastrar Funcionário</button>
            <a href="admin_painel.html"><button type="button">Voltar ao Painel</button></a>
        </form>
    </main>
    <script src="../script.js"></script>
</body>
</html>
