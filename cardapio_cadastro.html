Online HTML, CSS and JavaScript editor to run code online.

<!DOCTYPE html>
<html lang="pt-br">

<main>
  <h1>Configuração do Cardápio</h1>

  <section>
    <h3>Criar Nova Seção</h3>
    <form action="/criar-secao" method="POST">
      <input type="text" placeholder="Ex: Bebidas, Pizzas Doce..." required>
      <button type="submit">Adicionar Seção</button>
    </form>
  </section>

  <hr>

  <section>
    <h3>Adicionar Item ao Cardápio</h3>
    <form action="/adicionar-item" method="POST">
      
      <div>
        <label>Selecione a Seção:</label>
        <select required>
          <option value="">Escolha a seção...</option>
          <option value="porcoes">Porções</option>
          <option value="bebidas">Bebidas</option>
        </select>
      </div>

      <div>
        <label>Nome do Item (Obrigatório):</label>
        <input type="text" name="nome-item" required>
      </div>

      <div>
        <label>Ingredientes (Opcional):</label>
        <textarea name="ingredientes" rows="3" placeholder="Ex: Pão brioche, carne 180g..."></textarea>
      </div>

      <div>
        <label>Preço (Obrigatório):</label>
        <input type="number" name="preco" step="0.01" required>
      </div>

      <button type="submit">Cadastrar Item</button>
    </form>
  </section>

  <p><a href="admin.html">Voltar ao Painel</a></p>
</main>

</html>
