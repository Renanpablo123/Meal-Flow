<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <title>MealFlow - Painel da Cozinha</title>
</head>
<body>
    <header class="main-header">
        <div class="logo-container">
            <span class="brand-name">
                <span class="meal">Meal</span><span class="flow">Flow</span>
            </span>
        </div>
        <div class="header-title-container">
            <h1>Área de Produção (Cozinha)</h1>
            <p>Gerencie o estoque e a fila de pedidos.</p>
        </div>
    </header>
    <main>
        
        <section>
            <h2>Controle Rápido de Estoque 🛑</h2>
            <p><em>Desative itens que acabaram para removê-los do cardápio do garçom.</em></p>
            <ul class="lista-controle">
                <li>
                    <span>Batata Frita</span>
                    <button type="button" class="btn-esgotado">Marcar como Esgotado</button>
                </li>
                <li class="item-esgotado">
                    <span>Hambúrguer</span>
                    <button type="button" class="btn-reativar">Reativar Item</button>
                </li>
            </ul>
        </section>

        <hr>

        <section id="fila-pedidos">


        </section>
    </main>
    <script src="../db.js"></script>
    <script src="../script.js"></script>
</body>
</html>
