<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <title>MealFlow - Criar Conta</title>
</head>
<body>
    <main>
        <h2>Crie sua conta</h2>
        <form action="visitante.html" method="GET">
            
            <div>
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            <br>

            <div>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <br>

            <div>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            <br>

            <div>
                <label for="repetir_senha">Repetir Senha:</label>
                <input type="password" id="repetir_senha" name="repetir_senha" required>
            </div>
            <br>

            <button type="submit" style="background-color: #28a745;">Criar</button>
            <a href="login_aba.html"><button type="button" class="btn-cancelar">Voltar</button></a>
        </form>
    </main>
    <script src="../script.js"></script>
</body>
</html>
