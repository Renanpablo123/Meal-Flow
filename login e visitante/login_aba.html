<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <title>MealFlow - Login</title>
</head>
<body>
    <header class="main-header">
        <div class="logo-container">
            <img src="../assets/logo Meal-Flow.png" alt="Meal-Flow Logo" class="logo">
            <span class="brand-name">
                <span class="meal">Meal</span><span class="flow">Flow</span>
            </span>
        </div>
        <div class="header-title-container">
            <h1>Login</h1>
            <p>Acesse sua conta para continuar.</p>
        </div>
    </header>
    <main>
        <h1>Bem-vindo ao MealFlow</h1>
        <form action="visitante.html" method="GET">
            <div>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <br>
            <div>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            <div style="text-align: right; margin-top: 5px;">
                <a href="#" style="font-size: 0.9em; color: #666; text-decoration: none;" title="Indisponível no momento">Esqueci minha senha</a>
            </div>
            <br>
            <button type="submit">Logar</button>
        </form>

        <hr>

        <div style="text-align: center;">
            <p>Ainda não possui uma conta?</p>
            <a href="cadastro_usuario.html"><button type="button" style="background-color: #28a745;">Criar Nova Conta</button></a>
        </div>
    </main>
    <script src="../script.js"></script>
</body>
</html>
