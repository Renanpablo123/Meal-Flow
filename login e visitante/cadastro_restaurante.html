<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <title>MealFlow - Cadastrar Restaurante</title>
</head>
<body>
    <header class="main-header">
        <div class="logo-container">
            <img src="../assets/logo Meal-Flow.png" alt="Meal-Flow Logo" class="logo">
            <span class="brand-name">
                <span class="meal">Meal</span><span class="flow">Flow</span>
            </span>
        </div>
        <div class="header-title-container">
            <h1>Cadastre seu Restaurante</h1>
            <p>Preencha os dados para começar a usar o MealFlow.</p>
        </div>
    </header>
    <main>
        <h2>Cadastre seu Restaurante</h2>
        <form action="visitante.html" method="GET">
            
            <div>
                <label for="nome_restaurante">Nome do Restaurante (obrigatório):</label>
                <input type="text" id="nome_restaurante" name="nome_restaurante" required>
            </div>
            <div>
                <label for="nome_responsavel">Nome do responsavel (obrigatório):</label>
                <input type="text" id="nome_responsavel" name="nome_responsavel" required>
            </div>
            <br>

            <div>
                <label for="cnpj">CNPJ / MEI (opcional):</label>
                <input type="text" id="cnpj" name="cnpj">
            </div>
            <br>

            <div>
                <label for="endereco">Endereço Completo (obrigatório):</label>
                <input type="text" id="endereco" name="endereco" required>
            </div>
            <br>

            <div>
                <p>Tipo de Cozinha (obrigatório):</p>
                <label><input type="radio" name="tipo_cozinha" value="brasileira" required> Brasileira</label>
                <label><input type="radio" name="tipo_cozinha" value="italiana"> Italiana</label>
                <label><input type="radio" name="tipo_cozinha" value="japonesa"> Japonesa</label>
                <label><input type="radio" name="tipo_cozinha" value="lanchonete"> Lanchonete/Fast Food</label>
                <label><input type="radio" name="tipo_cozinha" value="outros"> Outros</label>
            </div>
            <br>

            <div>
                <label for="telefone">Telefone de Contato (obrigatório):</label>
                <input type="tel" id="telefone" name="telefone" required>
            </div>
            <br>

            <button type="submit">Finalizar Cadastro</button>
            <a href="visitante.html"><button type="button">Voltar</button></a>
        </form>
    </main>
    <script src="../script.js"></script>
</body>
</html>
