<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <title>MealFlow - Área do Visitante</title>
</head>
<body>
    <header class="main-header">
        <div class="logo-container">
            <img src="../assets/logo Meal-Flow.png" alt="Meal-Flow Logo" class="logo">
            <span class="brand-name">
                <span class="meal">Meal</span><span class="flow">Flow</span>
            </span>
        </div>
        <div class="header-title-container">
            <h1>Área do Visitante</h1>
            <p>Seja bem-vindo ao MealFlow.</p>
        </div>
    </header>
    <main>
        <h2>Olá, Visitante!</h2>
        
        <div class="mensagem-alerta">
            <p><strong>Aviso:</strong> Você ainda não está vinculado a nenhum restaurante.</p>
            <p>Por favor, aguarde ser adicionado por um Administrador ou cadastre o seu próprio estabelecimento abaixo.</p>
        </div>

        <br>
        <a href="cadastro_restaurante.html">
            <button type="button">Cadastrar meu próprio restaurante</button>
        </a>
    </main>
    <script src="../script.js"></script>
</body>
</html>
