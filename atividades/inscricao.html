<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Inscrição - 1º Hackathon de Informática da Escola</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-container">
            <img src="../assets/logo Meal-Flow.png" alt="Meal-Flow Logo" class="logo">
            <span class="brand-name">
                <span class="meal">Meal</span><span class="flow">Flow</span>
            </span>
        </div>
        <div class="header-title-container">
            <h1>Inscrição - 1º Hackathon de Informática da Escola</h1>
            <p>Preencha o formulário de inscrição.</p>
        </div>
    </header>

    <h1>Formulário de Inscrição</h1>
    <h2>1º Hackathon de Informática da Escola</h2>

    <form>

        <!-- Bloco 1: Dados Pessoais -->
        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="nome">Nome Completo:</label><br>
            <input type="text" id="nome" name="nome"><br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email"><br><br>

            <label for="senha">Senha para o sistema:</label><br>
            <input type="password" id="senha" name="senha"><br><br>

            <label for="nascimento">Data de Nascimento:</label><br>
            <input type="date" id="nascimento" name="nascimento"><br><br>
        </fieldset>

        <br>

        <!-- Bloco 2: Perfil Técnico -->
        <fieldset>
            <legend>Perfil Técnico</legend>

            <p>Quais linguagens você tem interesse?</p>

            <input type="checkbox" id="html" name="linguagem" value="HTML">
            <label for="html">HTML</label><br>

            <input type="checkbox" id="css" name="linguagem" value="CSS">
            <label for="css">CSS</label><br>

            <input type="checkbox" id="javascript" name="linguagem" value="JavaScript">
            <label for="javascript">JavaScript</label><br>

            <input type="checkbox" id="python" name="linguagem" value="Python">
            <label for="python">Python</label><br><br>

            <p>Nível de experiência:</p>

            <input type="radio" id="iniciante" name="nivel" value="iniciante">
            <label for="iniciante">Iniciante</label><br>

            <input type="radio" id="intermediario" name="nivel" value="intermediario">
            <label for="intermediario">Intermediário</label><br>

            <input type="radio" id="avancado" name="nivel" value="avancado">
            <label for="avancado">Avançado</label><br><br>

            <label for="arquivo">Anexe seu currículo ou portfólio:</label><br>
            <input type="file" id="arquivo" name="arquivo">

        </fieldset>

        <br>

        <!-- Bloco 3: Detalhes do Evento -->
        <fieldset>
            <legend>Detalhes do Evento</legend>

            <label for="camiseta">Tamanho da camiseta:</label><br>
            <select id="camiseta" name="camiseta">
                <option value="P">P</option>
                <option value="M">M</option>
                <option value="G">G</option>
                <option value="GG">GG</option>
            </select>

            <br><br>

            <label for="motivacao">Carta de motivação:</label><br>
            <textarea id="motivacao" name="motivacao" rows="6" cols="40"></textarea>

        </fieldset>

        <br>

        <button type="submit">Enviar Inscrição</button>

    </form>

    <script src="../script.js"></script>
</body>
</html>
