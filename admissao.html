<!DOCTYPE html>
<html lang="pt-br">

<main>
  <h1>Admissão de Funcionários</h1>
  <form action="/cadastrar-funcionario" method="POST">
    
    <div>
      <label for="nome-func">Nome Completo:</label>
      <input type="text" id="nome-func" name="nome-func" required>
    </div>

    <div>
      <label for="cargo">Função no Restaurante:</label>
      <select id="cargo" name="cargo" required>
        <option value="">Selecione o cargo...</option>
        <option value="garcom">Garçom</option>
        <option value="cozinheiro">Cozinha</option>
        <option value="gerente">Administrador</option>
      </select>
    </div>

    <button type="submit">Contratar Funcionário</button>
  </form>

  <p><a href="admin.html">Voltar ao Painel</a></p>
</main>

</html>
