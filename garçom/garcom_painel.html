<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <title>MealFlow - Painel do Garçom</title>
</head>
<body>
    <header class="main-header">
        <div class="logo-container">
            <span class="brand-name">
                <span class="meal">Meal</span><span class="flow">Flow</span>
            </span>
        </div>
        <div class="header-title-container">
            <h1>Área do Garçom</h1>
            <p>Crie e gerencie os pedidos.</p>
        </div>
    </header>
    <main>
        <section style="text-align: center;">
            <button type="button" class="btn-large" onclick="abrirModalNovoPedido()">➕ Novo Pedido</button>
        </section>

        <hr>

        <section>
            <h2>Pedidos</h2>
            <p><em>Acompanhe o status dos pedidos. Clique para finalizar apenas quando estiverem "Prontos".</em></p>
            
            <ul id="lista-pedidos-garcom" class="ready-orders-list">
                <!-- Pedidos serão carregados aqui via script.js -->
            </ul>
        </section>
    </main>
    <script src="../database/db.js"></script>
    <script src="../script.js"></script>
</body>
</html>
