<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <title>MealFlow - Detalhes da Retirada</title>
</head>
<body>
    <header class="main-header">
        <div class="logo-container">
            <span class="brand-name">
                <span class="meal">Meal</span><span class="flow">Flow</span>
            </span>
        </div>
        <div class="header-title-container">
            <h1>Detalhes da Retirada</h1>
            <p>Confirme os dados e finalize o pedido.</p>
        </div>
        <div class="header-actions">
            <a href="garcom_painel.html">
                <button type="button" class="btn-secondary">⬅ Voltar</button>
            </a>
        </div>
    </header>
    <main>
        <h2>Detalhes da Retirada</h2>
        
        <section style="border: 1px solid #ccc; padding: 15px;">
            <h3 id="detalhe-id">Pedido #---</h3>
            
            <p><strong>Nº da Mesa:</strong> <span id="detalhe-mesa">---</span></p>
            <p><strong>Nome do Cliente:</strong> <span id="detalhe-cliente">---</span></p>
            <p><strong>Telefone:</strong> <span id="detalhe-telefone">---</span></p>
            
            <hr>
            
            <p><strong>Itens:</strong></p>
            <ul id="detalhe-itens">
                <!-- Preenchido dinamicamente -->
            </ul>
            <p><strong>Valor Total:</strong> R$ <span id="detalhe-total">0,00</span></p>
        </section>

        <br>

        <form id="form-finalizar-pedido">
            <div>
                <label for="status_pagamento">Status do Pagamento (Obrigatório):</label>
                <select id="status_pagamento" name="status_pagamento" required>
                    <option value="" disabled selected>Selecione...</option>
                    <option value="pago">Pago</option>
                    <option value="nao_pago">Não Pago (Pendente)</option>
                </select>
            </div>
            <br>

            <div>
                <label for="reclamacoes">Anotar Reclamações/Feedbacks do Cliente (Opcional):</label><br>
                <textarea id="reclamacoes" name="reclamacoes" rows="4" cols="40" placeholder="Ex: Achou a batata fria..."></textarea>
            </div>
            <br>

            <button type="submit">Finalizar Pedido e Entregar</button>
        </form>
    </main>
    <script src="../db.js"></script>
    <script src="../script.js"></script>
</body>
</html>
