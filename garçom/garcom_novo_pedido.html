<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <title>MealFlow - Novo Pedido</title>
</head>
<body>
    <main>
        <h2>Cardápio - Selecionar Itens</h2>
        <form action="garcom_revisao.html" method="GET">
            
            <fieldset>
                <legend>Bebidas</legend>
                <div>
                    <input type="checkbox" id="item1" name="item1" value="Suco de Laranja">
                    <label for="item1">Suco de Laranja (R$ 10,00)</label>
                    <br>
                    <label for="qtd_item1">Qtd:</label>
                    <input type="number" id="qtd_item1" name="qtd_item1" value="1" min="1" style="width: 50px;">
                    
                    <label for="obs_item1">Obs:</label>
                    <input type="text" id="obs_item1" name="obs_item1" placeholder="Ex: Sem gelo e sem açúcar">
                </div>
            </fieldset>
            <br>

            <fieldset>
                <legend>Entradas</legend>
                <div>
                    <input type="checkbox" id="item2" name="item2" value="Batata Frita">
                    <label for="item2">Batata Frita (R$ 25,00)</label>
                    <br>
                    <label for="qtd_item2">Qtd:</label>
                    <input type="number" id="qtd_item2" name="qtd_item2" value="1" min="1" style="width: 50px;">
                    
                    <label for="obs_item2">Obs:</label>
                    <input type="text" id="obs_item2" name="obs_item2" placeholder="Ex: Metade sem sal">
                </div>
            </fieldset>
            <br>

            <button type="submit">Avançar para Identificação e Revisão</button>
            <a href="garcom_painel.html"><button type="button">Cancelar</button></a>
        </form>
    </main>
</body>
</html>
